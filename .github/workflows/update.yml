name: Daily Auto-Update
on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9:00 AM UTC
  workflow_dispatch: {}  # Manual trigger too

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape new tools
        run: python scripts/scraper.py --source github

      - name: Rebuild site
        run: python scripts/build.py

      - name: Commit and push if changed
        run: |
          git config user.name "AI Directory Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes — site is up to date"
          else
            git commit -m "🤖 auto-update: $(date -u +%Y-%m-%d)"
            git push
            echo "Pushed updates!"
          fi
